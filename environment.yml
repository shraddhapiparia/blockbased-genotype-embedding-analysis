name: genotype-embedding-env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Required for canonical pipeline
  - python=3.10
  - numpy<2.0
  - pandas>=1.3.0
  - pyyaml>=6.0
  - pytorch>=1.12.0  # includes torch, torchvision, torchaudio
  - scikit-learn>=1.0.0
  # Optional for visualization and advanced clustering
  - matplotlib>=3.5.0
  - umap-learn>=0.5.0
  - hdbscan>=0.8.0